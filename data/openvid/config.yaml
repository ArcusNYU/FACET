# OpenVid (Qwen/Qwen3-VL-8B-Instruct) Specific Hyper-params.
# top-level config.yaml references this file via datasets[].config field.

source: openvid

# actual data path on the server
data_root: /mnt/highspeed/users/Arcus/openvid

# split file (train / val)
split_file: data/openvid/train.json

# video parameters (consistent with prepare.py)
height: 480
width: 832
num_frames: 81
fps: 24

# ref parameters (consistent with prepare.py)
ref_size: 480
ref_per_clip: 3       # candidate ref number (prepare.py max limit)
ref_format: jpg       # storage format

# mask boundary perturbation (shared across sequences)
mask_perturb:
# FIXME: 以下参数除了概率值之外需要调小使得效果更加温和
  p_dilate: 0.5
  p_erode: 0.5
  dilate_range: [3, 11]
  erode_range:  [3, 7]
  p_elastic: 0.3
  elastic_alpha: 30.0 #FIXME: 调小
  elastic_sigma: 6.0 #FIME: 调大

# reference image background augmentation (within RefSampler during training)
ref_aug:
  p_keep: 0.4
  p_solid: 0.3
  p_distract: 0.3

# latent cache 
latent_cache: True
latent_cache_dir: /mnt/highspeed/users/Arcus/openvid/latents

# for prepare.py
prepare:
  csv_glob: /mnt/highspeed/users/Arcus/OPENVID_DATA/OpenHumanVid_part_*.csv
  raw_video_root: /mnt/highspeed/users/Arcus/OPENVID_DATA  
  out_root: /mnt/highspeed/users/Arcus/openvid             # = data_root
  index_file: index.jsonl
  category: upper_clothes        # MVP: upper clothes TODO: 后期实验继续添加???
  
  # ==== a. Parsing ====
  # parsing model:
  schp_model: weights/SCHP/schp.pth
  # schp_dataset: lip FIXME: 不需要这个 无关 
  schp_size: 473
  lip_label_ids: [5, 7]          # Upper-clothes(5), Coat(7); merged into single mask
  temporal_smooth_k: 3           # mask temporal median filter window

  # ==== b. Caption ====
  # caption filtering model:
  nli_model: weights/NLI/onnx/model.onnx

  # ==== c. Reference Image ====
  ref_candidates_k: 3            # stored ref jpg number
  ref_pad_ratio: 0.20            # bbox outer padding ratio FIXME: 调小
  # 1) computer vision Metrics:
  cv_min_size:                   # ref candidate 1st layer filter: bbox minimum side
    face:          96
    upper_clothes: 128
    pants:         128
    dress:         160
    hat:           64
    person:        192
  cv_mask_ratio:                 # ref candidate 1st layer filter: mask ratio within bbox
    # FIXME: 以下内容的上限调整至 0.95???? 或者甚至1??? 这些值的推荐范围是否合理
    face:          [0.30, 0.90]
    upper_clothes: [0.20, 0.85]   
    pants:         [0.20, 0.85]
    dress:         [0.25, 0.90]
    hat:           [0.15, 0.80]
    person:        [0.30, 0.90]
  # 2) quality evaluation model:
  iqa_model: weights/CLIP-IQA/CLIP-IQA.pth
  iqa_thresh: 0.10               # CLIP-IQA quality score threshold
  # 3) semantic analysis model:
  vlm_dir: weights/Qwen8B
  vlm_prompt: data/openvid/prompt.txt
 
  