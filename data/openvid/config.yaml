# OpenVid (Qwen/Qwen3-VL-8B-Instruct) Specific Hyper-params.
# top-level config.yaml references this file via datasets[].config field.

source: openvid

# actual data path on the server
data_root: /mnt/highspeed/users/Arcus/openvid

# BaseVideoDataset picks {split_dir}/{split}.json based on the split argument.
split_dir: data/openvid/splits

# video parameters (consistent with prepare.py)
height: 480
width: 832
num_frames: 81
fps: 24

# ref parameters (consistent with prepare.py)
ref_size: 480
ref_per_clip: 3       # candidate ref number (prepare.py max limit)
ref_format: png       # RGBA png; alpha=0 on padding, alpha=255 on bbox fg

# mask boundary perturbation (shared across sequences)
mask_perturb:
  p_dilate: 0.5
  p_erode: 0.5
  dilate_range: [3, 7]
  erode_range:  [3, 5]
  p_elastic: 0.3
  elastic_alpha: 8.0
  elastic_sigma: 12.0

# reference image background augmentation (within RefSampler during training)
# Solid branch rejection-samples a grayscale value that contrasts the garment.
ref_aug:
  p_solid: 0.5
  p_distract: 0.5

# latent cache 
latent_cache: True
latent_cache_dir: /mnt/highspeed/users/Arcus/openvid/latents

# for prepare.py
prepare:
  weight_dir: weights
  csv_glob: /mnt/highspeed/users/Arcus/OPENVID_DATA/OpenHumanVid_part_*.csv
  raw_video_root: /mnt/highspeed/users/Arcus/OPENVID_DATA  
  out_root: /mnt/highspeed/users/Arcus/openvid             # = data_root
  index_file: index.jsonl
  category: upper_clothes        # TODO: multi-category in later iterations
  
  # ==== a. Parsing ====
  schp_model: SCHP/schp.pth
  schp_batch: 32                 # frames per SCHP forward; A100 80GB can take 81 if memory permits
  lip_label_ids: [5, 7]          # Upper-clothes(5), Coat(7); merged into single mask
  temporal_smooth_k: 3           # mask temporal median filter window

  # ==== b. Caption ====
  nli_model_dir: NLI
  nli_onnx: model.onnx
  nli_batch_size: 128            # caption batch per onnx run (A100 up)

  # ==== c. Reference Image ====
  ref_candidates_k: 3            # stored ref png number
  ref_max_tries: 15              # cap rejection sampling tries (L1+L2+L3 per try)
  ref_pad_ratio: 0.20            # bbox outer padding ratio; square pad then resize
  # 1) computer vision Metrics:
  # Calibrated at target resolution (cfg.height x cfg.width = 480 x 832).
  # When SCHP runs on raw video, prepare.py scales these thresholds by
  # the raw->target fit_pad factor so the "min bbox in target space" semantic
  # stays consistent across portrait / landscape / mixed sources.
  cv_min_size:
    face:          48
    upper_clothes: 100
    pants:         72
    dress:         96
    hat:           32
    person:        120
  cv_mask_ratio:
    face:          [0.30, 0.90]
    upper_clothes: [0.35, 0.85]
    pants:         [0.20, 0.85]
    dress:         [0.25, 0.90]
    hat:           [0.15, 0.80]
    person:        [0.30, 0.90]
  # 2) quality evaluation model (pyiqa + MANIQA):
  iqa_metric: maniqa
  iqa_model: MANIQA/maniqa.pt
  iqa_thresh: 0.30               # MANIQA score threshold; empirically ~0.3 is a safe floor
  # 3) semantic analysis model:
  vlm_dir: Qwen8B
  vlm_prompt: data/openvid/pipeline/prompt.txt
