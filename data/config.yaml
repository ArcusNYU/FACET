# Multi-dataset training registry + shared transform/augmentation hyper-params.
#
# A. datasets[]:
#   name             : directory name under data/ (also the registry key).
#                      build_datasets() will lazily import data.{name}.{name}
#                      to trigger the @register("{name}") side-effect.
#   config           : (optional) sub-config path; defaults to data/{name}/config.yaml
#   train_per_epoch  : float in (0, 1]  -> ratio of the full train split size
#                      int   >= 1       -> absolute sample count per epoch
#                      YAML distinguishes 1.0 (float) from 1 (int);
#                      use 1.0 to mean "100% of the split".
#   valid_per_epoch  : same semantics, applied to the val split.
#
# Per-epoch quotas drive data/sampler.py::MultiSampler, which draws quota[i]
# indices from sub-dataset i per epoch, shuffles the union, and shards for DDP.

datasets:
  - name: openvid
    train_per_epoch: 1.0   # 100% of openvid train split every epoch
    valid_per_epoch: 0.4   # 40% of openvid val split every epoch

# TODO: 添加celebv数据集
  # - name: celebv
  #   train_per_epoch: 1.0   # 100% of celebv train split every epoch
  #   valid_per_epoch: 0.4   # 40% of celebv val split every epoch

  # Placeholder for the next dataset. Uncomment + register when prepared:
  # - name: ubcfashion
  #   train_per_epoch: 500   # int: 500 clips per epoch (absolute)
  #   valid_per_epoch: 50

# B. Shared transform / augmentation params.
#   These are CROSS-DATASET knobs read by data/transform.py::TfmBundle and
#   data/ref_sampler.py::RefSampler. Single-resolution training only -- if
#   multi-resolution is ever needed, push these back into the per-dataset
#   yaml. TfmBundle / RefSampler are instantiated ONCE inside build_datasets()
#   and reused across all sub-datasets.

# 1) Target spatial size for video & ref. Datasets coming in at a different
#    native size are aspect-preserving fit-padded into this canvas at runtime.
video_size:
  height: 480
  width:  832
ref_size: 480

# 2) Mask boundary perturbation (consistent across the T frames of a clip).
#    Simulates the imprecision of a user-drawn UI mask at inference time.
#    p_dilate and p_erode are MUTUALLY EXCLUSIVE: per call we draw one branch
#    in {dilate, erode, no-op} from a single uniform draw. Required:
#        p_dilate + p_erode <= 1.0
#    p_elastic is independent and stacks on top of the chosen morpho branch.
mask_perturb:
  p_dilate: 0.5          # dilate favored over erode: erosion exposes real hair strands; 
                         # dilation grows/distorts the mask shape, which better breaks the ref-shape <-> mask-shape bias.
  p_erode:  0.3          # remaining 0.2 mass -> no morphological op
  dilate_range: [3, 9]   # max ~9px expansion (was 7; a bit more shape distortion)
  erode_range:  [3, 5]   # max ~5px shrink (kept small to limit strand leakage)
  p_elastic: 0.4         # independent elastic warp; raised to further decorrelate mask shape
  elastic_alpha: 8.0     # amplitude
  elastic_sigma: 12.0    # smoothness

# 3) Reference image background augmentation, applied inside RefSampler.pick().
#    Three mutually-exclusive branches; weights must sum to <= 1.0:
#      p_solid    : fill the alpha=0 padding with constant gray 127 (matches the
#                   masked-region fill of src_video, so the network sees one
#                   neutral colour for "this area is unknown").
#      p_random   : fill with a randomly sampled grayscale that contrasts the
#                   garment foreground (rejection-sampled).
#      p_distract : low-freq RGB noise (kept implemented but disabled by default).
#    Any leftover probability -> raw RGB returned (no fill).
ref_aug:
  p_solid:    1.0
  p_random:   0.0
  p_distract: 0.0
