model:
  name: "Wan2.2-TI2V-5B"
  base_model_id: "Wan-AI/Wan2.2-TI2V-5B" #FIXME: 改为本地路径加载 而非huggingface下载
  base_model_path: "./weights/WAN"

  dtype: "bf16"
  device: "cuda"
  # freeze_base: true
  gradient_checkpointing: true

  wan:
    # model_type: "ti2v"
    patch_size: [1, 2, 2]
    vae_temporal_stride: 4
    vae_spatial_stride: 16
    # require_num_frames_4n_plus_1: true

  target:
    height: 480
    width: 832
    num_frames: 81
    hw_multiple: 32

  reference:
    # enabled: true
    image_size: 480
    # resize_mode: "center_crop_resize" 
    # encode_with_wan_vae: true
    # latent_frames: 1
    detach_latent: true
    timestep: 0.0
    injection_mode: "branch_attention"   # branch_attention | concat_tokens
    # update_reference_branch: true
    # independent_reference: false
    kv_cache_reference: true

  lora:
    enabled: true
    base_model: "dit"
    target_modules: ["q", "k", "v", "o", "ffn.0", "ffn.2"]
    rank: 32
    alpha: 32
    dropout: 0.0
    init: "kaiming_zero"
    branch_routing:
      target: "default"
      reference: "default"
      text: null

  text: # 基本上是用于T5 caption embedding
    max_text_len: 512
    # allow_prompt: true
    # allow_prompt_embeds: true

  inference:
    num_inference_steps: 50
    cfg_scale: 5.0 
    reference_guidance_scale: 1.0
    seed: null
    output_type: "pil"

  training:
    prediction_type: "flow_velocity"
    timestep_sampling: "logit_normal"
    loss_type: "mse"
    ref_dropout_prob: 0.05
    text_dropout_prob: 0.10