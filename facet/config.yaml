# 使用井号键"#"的参数不需要使用 现阶段暂时先注释保留

model:
  name: "FACET-WAN2.2"
  base: # 现阶段明确使用5B TI2V模型
    load_from: "local" # "huggingface" | "local"
    id: "Wan-AI/Wan2.2-TI2V-5B" # "Wan-AI/Wan2.2-TI2V-5B" | "Wan-AI/Wan2.2-T2V-A14B"
    # "Wan2.2-T2V-A14B"将来用于架构切换后的验证 以及大容量模型的scale-up验证
    dir: "./weights/WAN2.2"
    dit: "diffusion_pytorch_model*.safetensors"  # 5B模型有3个分片 | A14B模型有12个总MoE分片
    t5: "models_t5_umt5-xxl-enc-bf16.pth"
    vae: "Wan2.2_VAE.pth"
    tokenizer: "google/umt5-xxl"

  dtype: "bf16"
  device: "cuda"  # "cuda" | "cpu" | "auto"
  gradient_checkpointing: true

  wan:
    model_type: "ti2v" 
    patch_size: [1, 2, 2]
    vae_temporal_stride: 4
    vae_spatial_stride: 16  # WAN2.2_VAE: 16 | WAN2.1_VAE: 8
    token_temporal_stride: 4   # 1 * 4 = 4
    token_spatial_stride: 32   # 2 * 16 = 32

  target:
    height: 480
    width: 832
    num_frames: 81
    hw_multiple: 32

  source:
    # source 的 height / width / num_frames 需要与 target 相同
    f_offset: 0           # 0 = 与 base 共享 RoPE 坐标(spatially-aligned, 见 frame.txt)
                          
    timestep: 0.0
    injection_mode: "branch_attention"    # 仅文档用途
    kv_cache: true                        # 仅 inference 使用

    # OminiControl-style mask-aware bias (Q_base attend K_src / K_ref 时叠加)
    attention_mode: "asymmetric"          # "asymmetric" | "full_iteration"
    gamma: 1.0                            # log-bias 缩放因子(超参  后期可改成 per-layer 可学习参数)
    safe_epsilon: 1.0e-3                  # 防 log(0) 数值下溢
    mask_dilation: 0                      # mask 在 pool 之前的像素级 dilation 边界泄露时调高
    mask_pool: "avg"                      # "avg" | "nearest"
    q_chunk: 2048                    # base-branch attn query-chunk size; caps O(L^2) VRAM. <=0 disables chunking (full-length attention).
    detach_latent: true

  reference:
    image_size: 480
    h_offset: 0               # ref h 与 base 同范围 
    w_offset: 26              # null = 自动 = target.width / token_spatial_stride (480x832@stride32 -> 26)
    detach_latent: true       # NOTE: 肯定不会把梯度传latent本身上面
    timestep: 0.0             # 设置ref branch的加噪步为0 告知模型此为干净图像 而非噪声
    injection_mode: "branch_attention"   # NOTE: 仅表明OminiControl的架构 此cfg变量不会被使用 除了未来的消融实验
    kv_cache: true            # 仅 inference 使用 training中暂不使用

  lora:
    target_modules: ["q", "k", "v", "o", "ffn.0", "ffn.2"]
    on_base_blocks: True      # 对于WAN DiT blocks注入LoRA参数
    on_cross_attn: False      # 当前任务不以文字控制训练为主
    rank: 32                  # 沿用 DiffSynth 的设置
    alpha: 32
    dropout: 0.0
    init: "kaiming_zero"

  text: # text / caption embedding
    max_text_len: 512

  inference:
    num_inference_steps: 50
    cfg_scale: 5.0     #TODO: 是否是惯用设置？
    reference_guidance_scale: 1.0
    seed: null
    output_type: "video"      # frames: list of PIL frames | video: torch.Tensor [81, 3, 480, 832] [T, C, H, W]
