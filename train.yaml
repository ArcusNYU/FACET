# =============================================================================
# FACET training config.
#
# Loaded by launch_train.py and trainer/config.py (load_merge).
# facet/config.yaml (model) and train.yaml (training) are managed INDEPENDENTLY:
# Edit model knobs in facet/config.yaml; edit training knobs here. 
# load_merge only loads + records both into one snapshot.
# =============================================================================

# -----------------------------------------------------------------------------
# 0. Pointers to config files / weights / output roots
#    load_merge resolves every path below to an ABSOLUTE path (rooted at the
#    project dir that holds train.py), so downstream code never re-resolves cwd.
# -----------------------------------------------------------------------------
paths:
  facet_config:  "facet/config.yaml"        # model config (single source of truth)
  data_config:   "data/config.yaml"         # dataset registry (already wired in loader.py)
  weight_dir:    "weights/WAN2.2"           # WAN2.2-TI2V-5B base checkpoint root
  run_root:      "runs"                     # per-run output_root parent
  ckpt_root:     "ckpts"                    # exported best/last LoRA + manifest.json
  fvd_dir:       "weights/I3D"
  inception_dir: "weights/INC"

# -----------------------------------------------------------------------------
# 1. training:
#    FlowMatch / objective knobs. Lands at cfg.training.* .
#
#    Combination presets (see trainer/loss.py header):
#      A (SD3)       : logit_normal      + sigma_shift 1.0 + loss_weighting none
#      B (DiffSynth) : uniform(discrete) + sigma_shift 5.0 + loss_weighting bsmnt   <- DEFAULT
#      C             : logit_normal      + sigma_shift 5.0 + loss_weighting none
#    FACET uses B: matches WAN2.2-TI2V-5B inference shift (5.0), so the LoRA
#    trains on the same sigma distribution the base is conditioned on.
# -----------------------------------------------------------------------------
training:
  prediction_type:    "velocity"       # "noise" | "velocity"  (WAN / DiffSynth FlowMatch -> velocity)
  timestep_sampling:  "uniform"        # "uniform" | "logit_normal"
  sigma_shift:        5.0              # 1.0 = linear sigma, 5.0 = WAN2.2 default flow shift
  loss_weighting:     "bsmnt"          # "none" | "bsmnt"  (DiffSynth BSMNT gaussian weight)
  loss_type:          "mse"
  cfg_training:       false            # drop text/ref to train uncond branch (Phase 2+)
  text_dropout_prob:  0.0              # only consulted when cfg_training=true
  ref_dropout_prob:   0.0              # only consulted when cfg_training=true
  cached_t5:          true             # if true, batch["t5_emb"] is used directly
  cached_tgt_latent:  true             # if true, batch["tgt_latent"] is used directly

# -----------------------------------------------------------------------------
# 2. accel:
#    Compute-stack switches consumed by trainer.setup.init_env + launch_train.py.
# -----------------------------------------------------------------------------
accel:
  precision:                 "bf16"     # "no" | "fp16" | "bf16"
  cudnn_benchmark:           true       # benchmark mode for throughput (ablation runs)
  cudnn_deterministic:       false      # off; flip on for bit-exact debug
  allow_tf32:                true       # A100 fast matmul
  matmul_precision:          "high"     # "highest" | "high" | "medium"
  # NOTE: <matmul_precision = "high"> matches <allow_tf32 = true>
  find_unused_parameters:    false      # (default) 3-branch attn uses every LoRA param every step
  launcher:                  "auto"     # "auto" | "python" | "accelerate"  (read by launch_train.py)
  gpu_ids:                   [8]        # which GPU ids this run may use; num_gpus inferred from len()
  main_process_port:         29555      # accelerate DDP rendezvous port; change if the default 29500 is taken

# -----------------------------------------------------------------------------
# 3. train:
#    Loop-level knobs. Step counts are in OPTIMIZER STEPS (post-accum).
# -----------------------------------------------------------------------------
train:
  seed:                        42
  epochs:                      5
  max_steps:                   20000            # forced total length (drives run_name + lr schedule)
  batch_size:                  1
  num_workers:                 4
  gradient_accumulation_steps: 1
  max_grad_norm:               1.0

  optimizer:
    name:          "adamw"
    lr:            1.0e-4                     # DiffSynth Wan2.2-TI2V-5B.sh default 当使用r=128时 如果出现梯度不收敛 则调小至5e-5
    betas:         [0.9, 0.999]
    weight_decay:  1.0e-2                     # DiffSynth default; set 0.0 if you find LoRA drift
    eps:           1.0e-8

  scheduler:
    name:          "constant_with_warmup"     # "constant" | "constant_with_warmup"
    warmup_steps:  250                        # LoRA needs only a short ramp (was 1000)

  log_every_steps:  20                        # train-loss cadence (single source of truth)
  val_every_steps:  500                       # val-loss cadence
  save_every_steps: 200                       # rolling _last snapshot (resume aid); LoRA ckpt is small
  eval_every_steps: 500                       # full video generation + light metrics (PSNR/SSIM/LPIPS)
  start_eval_steps: 2000                      # no validation/eval before this step

# -----------------------------------------------------------------------------
# 4. run:
#    Output_root naming + suffix. trainer/setup.py builds:
#    run_name = f"{MMDD}_s{max_steps}_{suffix}"
# -----------------------------------------------------------------------------
run:
  suffix: "facet_r64"     # short tag; appended to run_name
  resume_from: null       # null = fresh run. Set to an existing run_name (e.g. "xxxx_s20000_facet_r64")
                          # to resume: reloads runs/<run_name>/ckpts/<run_name>_last.safetensors + step/epoch.

# -----------------------------------------------------------------------------
# 5. log:
#    Cloud + console logging. cloud_run_name defaults to run_name.
# -----------------------------------------------------------------------------
log:
  backend:         "mlflow"     # "mlflow" | "tensorboard" | "none"
  project_name:    "facet"
  cloud_run_name:  null         # null -> use run_name
  log_grad_norm:   true
  log_timestep_hist: true       # histogram of sampled t (debug timestep distribution)

# -----------------------------------------------------------------------------
# 6. validate:
#    Knobs for the in-loop validation (Phase 3). primary_metric drives top-K;
# -----------------------------------------------------------------------------
validate:
  num_samples:        20           # videos generated per validation pass
  num_inference_steps: 50
  cfg_scale:          5.0
  metrics:            ["psnr", "ssim", "lpips", "fid", "fvd"]  # TODO: may adjust later
  primary_metric:     "lpips"
  topk:               3
